<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MindGen AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/chatbot.js') }}" defer></script>
</head>
<body>
    <canvas id="bgCanvas" class="bg-canvas"></canvas>
    <header>
        <div class="nav-container">
            <a href="/" class="logo">🧠 MindGen<span>.AI</span></a>
            <nav class="nav-links">
                <a href="{{ url_for('login') }}" class="nav-link">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-primary">Register</a>
            </nav>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }}">
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <main class="auth-wrapper">
        <div class="auth-card glass-container">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Begin your genomic mental health journey</p>
            
            <form action="{{ url_for('register') }}" method="POST">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="johndoe12" required>
                </div>
                
                <div class="form-group">
                    <label for="security_question" class="form-label">Security Question</label>
                    <select id="security_question" name="security_question" class="form-input form-select" required>
                        <option value="What city were you born in?">What city were you born in?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                        <option value="What was your first school?">What was your first school?</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="security_answer" class="form-label">Security Answer</label>
                    <input type="text" id="security_answer" name="security_answer" class="form-input" placeholder="Your answer" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Account</button>
            </form>
            
            <div class="form-footer">
                Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
            </div>
        </div>
    </main>
</body>
</html>
